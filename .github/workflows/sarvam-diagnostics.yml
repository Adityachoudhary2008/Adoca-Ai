name: Sarvam Diagnostics

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]

jobs:
  run-diagnostics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Sarvam diagnostic
        env:
          SARVAM_API_KEY: ${{ secrets.SARVAM_API_KEY }}
          SARVAM_API_BASE: ${{ secrets.SARVAM_API_BASE }}
        run: |
          echo "Running sarvam diagnostics"
          python backend/run_sarvam_test.py
